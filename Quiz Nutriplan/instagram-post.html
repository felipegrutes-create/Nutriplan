<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1a1a1a; }
.post {
  width: 1080px; height: 1080px;
  position: relative; overflow: hidden;
  background: #0f1f15;
}
.post img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  filter: brightness(0.4);
}
.overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 80px;
}
.badge {
  display: inline-block;
  border: 1.5px solid rgba(201,146,42,.5);
  color: #C9922A;
  padding: 10px 28px;
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 40px;
}
.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 120px; font-weight: 700;
  color: #fff; line-height: 1.1;
  margin-bottom: 0;
}
.title-gold {
  font-family: 'Cormorant Garamond', serif;
  font-size: 120px; font-weight: 600;
  color: #C9922A; font-style: italic;
  line-height: 1.1; margin-bottom: 30px;
}
.subtitle {
  font-family: 'DM Sans', sans-serif;
  font-size: 24px; color: rgba(255,255,255,.6);
  line-height: 1.6; max-width: 700px;
}
.stats {
  display: flex; gap: 48px; margin-top: 50px;
  background: rgba(255,255,255,.08);
  backdrop-filter: blur(10px);
  border-radius: 20px; padding: 24px 48px;
  border: 1px solid rgba(255,255,255,.1);
}
.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px; font-weight: 700;
  font-style: italic; color: #C9922A;
}
.stat-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: rgba(255,255,255,.5);
  text-transform: uppercase; letter-spacing: 2px;
}
.logo {
  position: absolute; bottom: 40px; left: 50%;
  transform: translateX(-50%);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px; font-weight: 600;
  color: rgba(255,255,255,.3); letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="post">
  <img src="assets/photos/Fundo Front.jpg" alt="">
  <div class="overlay">
    <div class="badge">✦ Tu Bienestar Hormonal</div>
    <div class="title">El Código</div>
    <div class="title-gold">Hormonal</div>
    <div class="subtitle">Guías, recetas y herramientas para transformar tu salud hormonal</div>
    <div class="stats">
      <div style="text-align:center"><div class="stat-num">22</div><div class="stat-label">Ebooks</div></div>
      <div style="text-align:center"><div class="stat-num">500+</div><div class="stat-label">Recetas</div></div>
      <div style="text-align:center"><div class="stat-num">11</div><div class="stat-label">Bonos</div></div>
    </div>
  </div>
  <div class="logo">NUTRIPLAN</div>
</div>
</body>
</html>
